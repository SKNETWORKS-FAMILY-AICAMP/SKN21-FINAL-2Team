services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-.env.backend}
    volumes:
      - backend_uploads:/app/data/uploads
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/api/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ${FRONTEND_ENV_FILE:-.env.frontend}
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  backend_uploads:


networks:
  app-network:
    driver: bridge
