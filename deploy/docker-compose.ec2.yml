services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-.env.backend}
    volumes:
      - backend_uploads:/app/data/uploads
    depends_on:
      - qdrant
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ${FRONTEND_ENV_FILE:-.env.frontend}
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  backend_uploads:
  qdrant_data:


networks:
  app-network:
    driver: bridge
